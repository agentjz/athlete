<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kitty Workbench</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="workbench-shell">
      <section class="file-pane" aria-label="Project files" data-i18n-attr="aria-label:filePaneLabel">
        <div class="pane-header">
          <div>
            <div class="pane-title" data-i18n="explorerTitle">Explorer</div>
            <div id="projectName" class="pane-subtitle">Kitty</div>
          </div>
          <div class="pane-actions">
            <button id="newFileButton" class="icon-button" type="button" title="New file" data-i18n-attr="title:newFile">
              <i class="bi bi-file-earmark-plus"></i>
            </button>
            <button id="newFolderButton" class="icon-button" type="button" title="New folder" data-i18n-attr="title:newFolder">
              <i class="bi bi-folder-plus"></i>
            </button>
            <button id="renamePathButton" class="icon-button" type="button" title="Rename" data-i18n-attr="title:renamePath">
              <i class="bi bi-pencil-square"></i>
            </button>
            <button id="deletePathButton" class="icon-button danger" type="button" title="Delete" data-i18n-attr="title:deletePath">
              <i class="bi bi-trash3"></i>
            </button>
            <button id="refreshTreeButton" class="icon-button" type="button" title="Refresh files" data-i18n-attr="title:refreshFiles">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>
        <div id="fileTree" class="file-tree"></div>
        <div class="changed-section">
          <div class="section-label" data-i18n="changesTitle">Changes</div>
          <div id="changedFiles" class="changed-files"></div>
        </div>
      </section>

      <section class="editor-pane" aria-label="File content" data-i18n-attr="aria-label:editorPaneLabel">
        <div class="editor-header">
          <div class="editor-tabs-wrap">
            <div id="openTabs" class="open-tabs"></div>
            <button id="diffTab" class="editor-tab" type="button">
              <i class="bi bi-git"></i>
              <span data-i18n="diff">Diff</span>
            </button>
          </div>
          <div class="editor-actions">
            <span id="activePath" class="active-path" data-i18n="noFileOpen">No file open</span>
            <span id="fileState" class="file-state"></span>
            <button id="closeFileButton" class="icon-button" type="button" title="Close file" data-i18n-attr="title:closeFile" disabled>
              <i class="bi bi-x-lg"></i>
            </button>
            <button id="saveButton" class="btn btn-sm btn-primary" type="button" disabled>
              <i class="bi bi-save"></i>
              <span data-i18n="save">Save</span>
            </button>
          </div>
        </div>
        <div id="editorHost" class="editor-host"></div>
        <div id="diffHost" class="editor-host" hidden></div>
        <div id="emptyEditor" class="empty-editor">
          <i class="bi bi-file-earmark-text"></i>
          <div data-i18n="selectFile">Select a file from Explorer</div>
        </div>
      </section>

      <aside class="chat-pane" aria-label="Kitty chat" data-i18n-attr="aria-label:chatPaneLabel">
        <div class="chat-header">
          <div>
            <div class="pane-title">Kitty</div>
          </div>
        </div>
        <div id="todoStrip" class="todo-strip" hidden></div>
        <div id="chatStream" class="chat-stream"></div>
        <div id="activityLine" class="activity-line" data-work-state="idle" hidden>
          <span id="activitySpinner" class="activity-spinner" aria-hidden="true"></span>
          <span id="activityText" class="activity-text"></span>
        </div>
        <form id="promptForm" class="prompt-form">
          <textarea id="promptInput" class="form-control" rows="3" placeholder="Enter to send, Shift+Enter for newline" data-i18n-attr="placeholder:promptPlaceholder"></textarea>
          <div class="prompt-footer">
            <div class="runtime-strip" aria-label="Runtime status">
              <span id="connectionDot" class="connection-dot offline" title="离线"></span>
              <span id="runtimeMeta" class="runtime-chip" data-i18n="connecting">连接中</span>
              <span id="modeMeta" class="runtime-chip"></span>
            </div>
            <button id="sendButton" class="btn btn-primary" type="submit">
              <i class="bi bi-send"></i>
              <span data-i18n="send">Send</span>
            </button>
          </div>
        </form>
      </aside>
    </main>

    <div id="pathActionModal" class="modal fade" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <form id="pathActionForm" class="modal-content">
          <div class="modal-header">
            <h1 id="pathActionTitle" class="modal-title fs-6">Path action</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <label id="pathActionLabel" for="pathActionInput" class="form-label">Path</label>
            <input id="pathActionInput" class="form-control" type="text" autocomplete="off">
            <div id="pathActionError" class="invalid-feedback"></div>
            <div id="pathActionHelp" class="form-text"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
            <button id="pathActionSubmit" type="submit" class="btn btn-primary" data-i18n="confirm">Confirm</button>
          </div>
        </form>
      </div>
    </div>

    <div id="confirmActionModal" class="modal fade" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 id="confirmActionTitle" class="modal-title fs-6">Confirm</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="confirmActionBody" class="modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
            <button id="confirmActionSubmit" type="button" class="btn btn-danger" data-i18n="confirm">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/vendor/dompurify/purify.min.js"></script>
    <script src="/vendor/marked/marked.umd.js"></script>
    <script src="/vendor/monaco/vs/loader.js"></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
